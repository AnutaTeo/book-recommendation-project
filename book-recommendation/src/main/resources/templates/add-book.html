<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Add Book</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <h1>Add a New Book</h1>

  <p th:if="${param.success}" style="color: green;">
    Book added successfully to the RDF file.
  </p>

  <form method="post" action="/books/add">

    <label>Title:</label><br>
    <input type="text" name="title" value="Harry Potter" required><br><br>

    <label>Author:</label><br>
    <input type="text" name="author" value="J. K. Rowling" required><br><br>

    <label>First Theme:</label><br>
    <input type="text" name="theme1" value="Fantasy" required><br><br>

    <label>Second Theme:</label><br>
    <input type="text" name="theme2" value="Magic"><br><br>

    <label>Reading Level:</label><br>
    <select name="readingLevel" required>
      <option value="Beginner">Beginner</option>
      <option value="Intermediate" selected>Intermediate</option>
      <option value="Advanced">Advanced</option>
    </select><br><br>

    <button type="submit">Add Harry Potter</button>
  </form>

  <br>

  <a href="/">Back to Home</a>
</div>

</body>
</html>
